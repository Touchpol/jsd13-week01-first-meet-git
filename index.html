<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RED Star Optik</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
      padding: 40px 20px;
    }
    h1 {
      text-align: center;
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #e94560;
      letter-spacing: 2px;
    }
    .contact {
      text-align: center;
      font-size: 1rem;
      margin-bottom: 40px;
      color: #aaa;
    }
    .contact a {
      color: #e94560;
      text-decoration: none;
    }
    .contact a:hover { text-decoration: underline; }
    .grid {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 30px;
    }
    .card {
      background: #16213e;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 36px rgba(233,69,96,0.15);
    }
    .card-img {
      width: 100%;
      height: 240px;
      object-fit: cover;
      display: block;
    }
    .card-img[src=""],
    .card-img:not([src]) { display: none; }
    .card-body {
      padding: 20px;
    }
    .card-body h2 {
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: #fff;
    }
    .card-body .flag { font-size: 1.3rem; }
    .info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 16px;
      font-size: 0.9rem;
      margin-bottom: 14px;
    }
    .info .label { color: #888; }
    .info .value { color: #ddd; }
    .desc {
      font-size: 0.9rem;
      color: #aaa;
      line-height: 1.5;
      border-top: 1px solid #0f3460;
      padding-top: 14px;
    }
  </style>
</head>
<body>
  <h1>RED Star Optik</h1>
  <div class="contact">
    Facebook: <a href="https://facebook.com/RSO.REDStarOptik" target="_blank">RSO: RED Star Optik</a> &nbsp;|&nbsp;
    Shopee: <a href="https://shopee.com/redstaroptik" target="_blank">Red Star Optik</a>
  </div>
  <div class="grid" id="cameraGrid"></div>
  <script>
    const cameraDatabase = [
      { id: 1, name: "Зенит-3М (Zenit-3M)", type: "Film", format: "35mm", nation: "USSR", city: "Krasnogorsk", year: "1962", lens: "Helios-44 58mm", shutter: "1/500s", flag: "🇷🇺", image: "Camera/Zenit-3m.jpg", description: "A classic Soviet 35mm mechanical SLR camera manufactured by KMZ (Krasnogorsk Mechanical Plant) between 1962 and 1970." },
      { id: 2, name: "Зенит-Е (Zenit-E)", type: "Film", format: "35mm", nation: "USSR", city: "Krasnogorsk", year: "1965", lens: "Industar-50 50mm", shutter: "1/500s", flag: "🇷🇺", image: "Camera/Zenit-E.jpg", description: "A popular Soviet SLR camera known for its durability, simplicity, and widespread ease of use." },
      { id: 3, name: "Зоркий-3 (Zorki-3)", type: "Film", format: "35mm", nation: "USSR", city: "Krasnogorsk", year: "1951", lens: "Jupiter-8 50mm", shutter: "1/1000s", flag: "🇷🇺", image: "Camera/Zorki-3.jpg", description: "The Zorki-3 is a highly regarded Soviet 35 mm rangefinder camera, moving away from the basic Leica II copy design." },
      { id: 4, name: "Киев-17 (Kiev-17)", type: "Film", format: "35mm", nation: "Ukraine", city: "Kiev", year: "1977", lens: "Helios-81N 50mm", shutter: "1/1000s", flag: "🇺🇦", image: "Camera/Kiev-17.jpg", description: "A pioneering Soviet SLR camera using the Nikon-F mount, allowing the use of a wide variety of high-quality lenses." },
      { id: 5, name: "Киев-88 (Kiev-88)", type: "Film", format: "Medium Format", nation: "USSR", city: "Kiev", year: "1980", lens: "Volna-3 80mm", shutter: "1/1000s", flag: "🇺🇦", image: "Camera/Kiev-88.jpg", description: "The Kiev-88 is a Soviet-made medium format SLR camera famously known as an affordable alternative to the Hasselblad." },
      { id: 6, name: "ФЭД-4 (Fed-4)", type: "Film", format: "35mm", nation: "USSR", city: "Kharkiv", year: "1964", lens: "Industar-61 52mm", shutter: "1/500s", flag: "🇺🇦", image: "Camera/Fed-4.jpg", description: "A classic rangefinder camera with a built-in selenium light meter, reflecting iconic Soviet design style." },
      { id: 7, name: "Exakta-1b", type: "Film", format: "35mm", nation: "Germany", city: "Dresden", year: "1977", lens: "Domiplan 50mm", shutter: "1/1000s", flag: "🇩🇪", image: "Camera/Exa-1b.jpg", description: "An elegant German 35mm SLR camera built in Dresden, continuing the historic Exakta heritage." }
    ];

    const grid = document.getElementById('cameraGrid');
    cameraDatabase.forEach(cam => {
      const card = document.createElement('div');
      card.className = 'card';

      const img = document.createElement('img');
      img.className = 'card-img';
      img.alt = cam.name;
      img.src = cam.image;

      const body = document.createElement('div');
      body.className = 'card-body';
      body.innerHTML = `
        <h2>${cam.name} ${cam.flag}</h2>
        <div class="info">
          <span class="label">Type</span><span class="value">${cam.type}</span>
          <span class="label">Format</span><span class="value">${cam.format}</span>
          <span class="label">Country</span><span class="value">${cam.nation}, ${cam.city}</span>
          <span class="label">Year</span><span class="value">${cam.year}</span>
          <span class="label">Lens</span><span class="value">${cam.lens}</span>
          <span class="label">Shutter</span><span class="value">${cam.shutter}</span>
        </div>
        <div class="desc">${cam.description}</div>
      `;

      card.appendChild(img);
      card.appendChild(body);
      grid.appendChild(card);
    });
  </script>
</body>
</html>
